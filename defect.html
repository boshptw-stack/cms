<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Defect Management — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <h1><button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button> Defect Management</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal('modalNew')">+ Report Defect</button>
        <button class="btn btn-secondary btn-sm" onclick="load()">↻</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat c-red"><div class="stat-icon">🐛</div><div class="stat-label">Open</div><div class="stat-value" data-v="0">0</div></div>
        <div class="stat c-yellow"><div class="stat-icon">🔧</div><div class="stat-label">In Progress</div><div class="stat-value" data-v="0">0</div></div>
        <div class="stat c-green"><div class="stat-icon">✅</div><div class="stat-label">Closed</div><div class="stat-value" data-v="0">0</div></div>
        <div class="stat c-blue"><div class="stat-icon">📊</div><div class="stat-label">Total</div><div class="stat-value" data-v="0">0</div></div>
      </div>
      <div class="filters">
        <select class="filter-select" id="fStatus" onchange="filter()"><option value="">All Status</option><option>Open</option><option>In Progress</option><option>Closed</option></select>
        <select class="filter-select" id="fSev" onchange="filter()"><option value="">All Severity</option><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select>
        <input class="search-input" id="fSearch" placeholder="Search..." oninput="filter()">
      </div>
      <div class="table-card show">
        <table class="dt"><thead><tr><th>Defect #</th><th>Date</th><th>Location</th><th>Description</th><th>Severity</th><th>Status</th><th>Assigned</th><th>Actions</th></tr></thead><tbody id="tbl"></tbody></table>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="modalNew">
  <div class="modal">
    <div class="modal-head"><h2>Report Defect</h2><button class="modal-close" onclick="closeModal('modalNew')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Location</label><input class="form-input" id="dfLoc" placeholder="Block / Level / Unit"></div>
        <div class="form-group"><label>Severity</label><select class="form-input" id="dfSev"><option>Low</option><option selected>Medium</option><option>High</option><option>Critical</option></select></div>
      </div>
      <div class="form-group"><label>Description</label><textarea class="form-input" id="dfDesc" placeholder="Describe the defect..."></textarea></div>
      <div class="form-group"><label>Assign to</label><input class="form-input" id="dfAssign" placeholder="Contractor / Person"></div>
      <div class="form-group"><label>Photos</label>
        <div class="photo-upload" onclick="document.getElementById('dfPhotos').click()">📷 Upload<input type="file" id="dfPhotos" accept="image/*" multiple></div>
        <div class="photo-grid" id="dfPhotoPreview"></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal('modalNew')">Cancel</button><button class="btn btn-primary" onclick="submitDefect()">Submit →</button></div>
  </div>
</div>
<script src="app.js"></script>
<script>
if (!initPage('defect')) throw '';
let allData = [];
const user = Auth.get();
setupPhotoUpload('dfPhotos','dfPhotoPreview');
const demoData = [
  {id:'DEF-032',date:'2026-05-01',location:'Block A L5 Unit 03',desc:'Crack in wall plaster',severity:'Medium',status:'Open',assigned:'PlasterCo'},
  {id:'DEF-031',date:'2026-04-30',location:'Block B L3 Corridor',desc:'Water leakage from ceiling',severity:'High',status:'In Progress',assigned:'WaterFix'},
  {id:'DEF-030',date:'2026-04-29',location:'Block C L2 Unit 08',desc:'Chipped floor tile',severity:'Low',status:'Closed',assigned:'TilePro'},
  {id:'DEF-029',date:'2026-04-28',location:'Block D Lobby',desc:'Paint peeling on column',severity:'Low',status:'Open',assigned:'PaintCo'},
  {id:'DEF-028',date:'2026-04-27',location:'Block A L7 Unit 12',desc:'Window seal damage',severity:'Medium',status:'In Progress',assigned:'GlassFit'},
  {id:'DEF-027',date:'2026-04-26',location:'Block B Roof',desc:'Waterproofing membrane tear',severity:'Critical',status:'Open',assigned:'WaterFix'},
];
async function load() {
  showLoad('Loading...'); let d = await API.get('getDefects'); allData = d?.items || demoData; renderTable(allData); hideLoad();
  const open=allData.filter(r=>r.status==='Open').length, prog=allData.filter(r=>r.status==='In Progress').length, closed=allData.filter(r=>r.status==='Closed').length;
  const els = document.querySelectorAll('.stat-value');
  [open,prog,closed,allData.length].forEach((v,i)=>{els[i].dataset.v=v;});
  initReveal(); initCountUps();
}
function renderTable(items) { document.getElementById('tbl').innerHTML = items.map(r=>`<tr>
  <td style="color:var(--yellow);font-weight:600">${r.id}</td><td>${fmtDate(r.date)}</td><td>${r.location}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.desc}</td><td>${sevBadge(r.severity)}</td><td>${statusBadge(r.status)}</td><td>${r.assigned}</td>
  <td>${r.status==='Open'?`<button class="btn btn-success btn-sm" onclick="updateStatus('${r.id}','In Progress')">Start</button>`:r.status==='In Progress'?`<button class="btn btn-primary btn-sm" onclick="updateStatus('${r.id}','Closed')">Close</button>`:''}</td>
</tr>`).join('')||'<tr><td colspan="8" class="empty">No records</td></tr>';}
function filter(){const st=document.getElementById('fStatus').value,sev=document.getElementById('fSev').value,q=document.getElementById('fSearch').value.toLowerCase();renderTable(allData.filter(r=>(!st||r.status===st)&&(!sev||r.severity===sev)&&(!q||Object.values(r).some(v=>String(v).toLowerCase().includes(q)))));}
async function updateStatus(id,status){showLoad('Updating...');await API.post('updateDefect',{id,status,updatedBy:user.username});hideLoad();toast(`Defect ${status}`,'ok');load();}
async function submitDefect(){const data={location:document.getElementById('dfLoc').value,severity:document.getElementById('dfSev').value,description:document.getElementById('dfDesc').value,assigned:document.getElementById('dfAssign').value,reportedBy:user.username};if(!data.location||!data.description){toast('Fill required fields','err');return;}showLoad('Submitting...');const r=await API.post('submitDefect',data);hideLoad();if(r?.success){toast('Defect reported!','ok');closeModal('modalNew');load();}else toast('Failed','err');}
load();
</script>
</body>
</html>
