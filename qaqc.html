<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Quality Inspection — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <h1><button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button> Quality Inspection</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal('modalNew')">+ New Inspection</button>
        <button class="btn btn-secondary btn-sm" onclick="load()">↻</button>
      </div>
    </div>
    <div class="content">
      <div class="filters">
        <select class="filter-select" id="fStatus" onchange="filter()"><option value="">All Status</option><option>Open</option><option>In Progress</option><option>Closed</option></select>
        <input class="search-input" id="fSearch" placeholder="Search..." oninput="filter()">
      </div>
      <div class="table-card show">
        <table class="dt"><thead><tr><th>QA #</th><th>Date</th><th>Location</th><th>Category</th><th>Status</th><th>Inspector</th><th>Actions</th></tr></thead><tbody id="tbl"></tbody></table>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="modalNew">
  <div class="modal">
    <div class="modal-head"><h2>New Quality Inspection</h2><button class="modal-close" onclick="closeModal('modalNew')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Location</label><input class="form-input" id="qaLoc" placeholder="Block / Level"></div>
        <div class="form-group"><label>Category</label><select class="form-input" id="qaCat"><option>Structural</option><option>MEP</option><option>Architectural</option><option>Finishing</option><option>Waterproofing</option></select></div>
      </div>
      <div class="form-group"><label>Description</label><textarea class="form-input" id="qaDesc" placeholder="Describe inspection findings..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Before Photos</label><div class="photo-upload" onclick="document.getElementById('qaBefore').click()">📷 Before<input type="file" id="qaBefore" accept="image/*" multiple></div><div class="photo-grid" id="qaBeforePrev"></div></div>
        <div class="form-group"><label>After Photos</label><div class="photo-upload" onclick="document.getElementById('qaAfter').click()">📷 After<input type="file" id="qaAfter" accept="image/*" multiple></div><div class="photo-grid" id="qaAfterPrev"></div></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal('modalNew')">Cancel</button><button class="btn btn-primary" onclick="submitQA()">Submit →</button></div>
  </div>
</div>
<script src="app.js"></script>
<script>
if (!initPage('qaqc')) throw '';
let allData = [];
const user = Auth.get();
const demoData = [
  {id:'QA-045',date:'2026-05-01',location:'Block A L5',category:'Structural',status:'Open',inspector:'QAQC Team'},
  {id:'QA-044',date:'2026-04-30',location:'Block B L3',category:'MEP',status:'In Progress',inspector:'Lim'},
  {id:'QA-043',date:'2026-04-29',location:'Block C L2',category:'Finishing',status:'Closed',inspector:'QAQC Team'},
  {id:'QA-042',date:'2026-04-28',location:'Block D L1',category:'Waterproofing',status:'Open',inspector:'Ahmad'},
  {id:'QA-041',date:'2026-04-27',location:'Block A L4',category:'Architectural',status:'Closed',inspector:'Raj'},
];
setupPhotoUpload('qaBefore','qaBeforePrev'); setupPhotoUpload('qaAfter','qaAfterPrev');
async function load() { showLoad('Loading...'); let d = await API.get('getQAQC'); allData = d?.items || demoData; renderTable(allData); hideLoad(); }
function renderTable(items) { document.getElementById('tbl').innerHTML = items.map(r => `<tr><td style="color:var(--yellow);font-weight:600">${r.id}</td><td>${fmtDate(r.date)}</td><td>${r.location}</td><td>${r.category}</td><td>${statusBadge(r.status)}</td><td>${r.inspector}</td><td><button class="btn btn-secondary btn-sm">View</button></td></tr>`).join('') || '<tr><td colspan="7" class="empty">No records</td></tr>'; }
function filter() { const st=document.getElementById('fStatus').value,q=document.getElementById('fSearch').value.toLowerCase(); renderTable(allData.filter(r=>(!st||r.status===st)&&(!q||Object.values(r).some(v=>String(v).toLowerCase().includes(q))))); }
async function submitQA() { const data={location:document.getElementById('qaLoc').value,category:document.getElementById('qaCat').value,description:document.getElementById('qaDesc').value,inspector:user.username}; if(!data.location){toast('Enter location','err');return;} showLoad('Submitting...'); const r=await API.post('submitQAQC',data); hideLoad(); if(r?.success){toast('Submitted!','ok');closeModal('modalNew');load();}else toast(r?.error||'Failed','err'); }
load();
</script>
</body>
</html>
