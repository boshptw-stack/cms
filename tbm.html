<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBM — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <div class="main-content">
      <header class="page-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="mobile-toggle header-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <h1>Toolbox Meeting</h1>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="loadData()">↻ Refresh</button>
        </div>
      </header>

      <div class="page-body">
        <div class="filters-bar">
          <select class="filter-select" id="topicFilter" onchange="filterTable()">
            <option value="">All Topics</option>
            <option value="Working at Height">Working at Height</option>
            <option value="Electrical Safety">Electrical Safety</option>
            <option value="Fire Prevention">Fire Prevention</option>
            <option value="PPE Usage">PPE Usage</option>
            <option value="Chemical Handling">Chemical Handling</option>
            <option value="Housekeeping">Housekeeping</option>
            <option value="Heat Stress">Heat Stress</option>
          </select>
          <input type="text" class="table-search" placeholder="Search TBM..." id="searchInput" oninput="filterTable()">
        </div>

        <div class="table-card">
          <table class="data-table">
            <thead>
              <tr><th>TBM ID</th><th>Date</th><th>Topic</th><th>Location</th><th>Conductor</th><th>Attendance</th><th>Status</th></tr>
            </thead>
            <tbody id="tbmBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (!initPage('tbm')) throw 'Auth required';
    let allData = [];

    const demoItems = [
      { id:'TBM-156', date:'2026-05-01', topic:'Working at Height', location:'Block A', conductor:'Ahmad', attendance:22, status:'Completed' },
      { id:'TBM-155', date:'2026-04-30', topic:'Electrical Safety', location:'Block B', conductor:'Raj', attendance:18, status:'Completed' },
      { id:'TBM-154', date:'2026-04-29', topic:'PPE Usage', location:'Block C', conductor:'Lim', attendance:20, status:'Completed' },
      { id:'TBM-153', date:'2026-04-28', topic:'Fire Prevention', location:'Block D', conductor:'Ali', attendance:15, status:'Completed' },
      { id:'TBM-152', date:'2026-04-27', topic:'Housekeeping', location:'Block A', conductor:'Tan', attendance:19, status:'Completed' },
      { id:'TBM-151', date:'2026-04-26', topic:'Chemical Handling', location:'Block B', conductor:'Kumar', attendance:16, status:'Completed' },
      { id:'TBM-150', date:'2026-04-25', topic:'Heat Stress', location:'Block C', conductor:'Wong', attendance:21, status:'Completed' },
      { id:'TBM-149', date:'2026-04-24', topic:'Working at Height', location:'Block D', conductor:'Ahmad', attendance:17, status:'Completed' },
      { id:'TBM-148', date:'2026-04-23', topic:'Electrical Safety', location:'Block A', conductor:'Raj', attendance:14, status:'Completed' },
      { id:'TBM-147', date:'2026-04-22', topic:'Fire Prevention', location:'Block B', conductor:'Lim', attendance:18, status:'Completed' },
    ];

    async function loadData() {
      showLoading('Loading TBM data...');
      let data = await API.getTBMData();
      allData = (data && data.items) ? data.items : demoItems;
      renderTable(allData);
      hideLoading();
      initScrollAnimations();
    }

    function renderTable(items) {
      document.getElementById('tbmBody').innerHTML = items.map(r => `
        <tr>
          <td style="color:var(--text-accent);font-weight:600">${r.id}</td>
          <td>${formatDate(r.date)}</td>
          <td>${r.topic}</td>
          <td>${r.location}</td>
          <td>${r.conductor}</td>
          <td>${r.attendance}</td>
          <td>${statusBadge(r.status)}</td>
        </tr>
      `).join('') || '<tr><td colspan="7"><p style="text-align:center;padding:40px;color:var(--text-muted)">No records found</p></td></tr>';
    }

    function filterTable() {
      const topic = document.getElementById('topicFilter').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allData.filter(r =>
        (!topic || r.topic === topic) &&
        (!search || Object.values(r).some(v => String(v).toLowerCase().includes(search)))
      );
      renderTable(filtered);
    }

    loadData();
  </script>
</body>
</html>
