<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>PTW — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <h1><button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button> Permit to Work</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" id="addBtn" onclick="openNewPTW()" style="display:none">+ New PTW</button>
        <button class="btn btn-secondary btn-sm" onclick="load()">↻ Refresh</button>
      </div>
    </div>
    <div class="content">
      <div class="filters">
        <select class="filter-select" id="fStatus" onchange="filter()"><option value="">All Status</option><option>Pending PIC</option><option>Pending EHS</option><option>Pending PM</option><option>Approved</option><option>Active</option><option>Closed</option><option>Rejected</option><option>Revoked</option><option>Expired</option></select>
        <select class="filter-select" id="fType" onchange="filter()"><option value="">All Types</option><option>Hot Work</option><option>Confined Space</option><option>Electrical</option><option>Excavation</option><option>Working at Height</option><option>General</option></select>
        <input class="search-input" id="fSearch" placeholder="Search PTW..." oninput="filter()">
      </div>
      <div class="table-card show">
        <table class="dt"><thead><tr><th>PTW #</th><th>Type</th><th>Location</th><th>Status</th><th>Date</th><th>Supervisor</th><th>Actions</th></tr></thead><tbody id="tbl"></tbody></table>
      </div>
    </div>
  </div>
</div>

<!-- New PTW Modal -->
<div class="modal-backdrop" id="modalNew">
  <div class="modal" style="max-width:740px">
    <div class="modal-head"><h2>New Permit to Work</h2><button class="modal-close" onclick="closeModal('modalNew')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>PTW Type</label><select class="form-input" id="ptwType" onchange="loadChecklist()"><option value="">Select type...</option><option>Hot Work</option><option>Confined Space</option><option>Electrical</option><option>Excavation</option><option>Working at Height</option><option>General</option></select></div>
        <div class="form-group"><label>Location / Area</label><input class="form-input" id="ptwLocation" placeholder="e.g. Block A Level 5"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Start Date/Time</label><input class="form-input" id="ptwStart" type="datetime-local"></div>
        <div class="form-group"><label>End Date/Time</label><input class="form-input" id="ptwEnd" type="datetime-local"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Project</label><select class="form-input" id="ptwProject"><option value="">Select project...</option></select></div>
        <div class="form-group"><label>Assign to PIC</label><select class="form-input" id="ptwPIC"><option value="">Select PIC...</option></select></div>
      </div>
      <div class="form-group"><label>Work Description</label><textarea class="form-input" id="ptwDesc" placeholder="Describe the work to be carried out..."></textarea></div>
      <div class="form-group"><label>Workers (comma separated)</label><input class="form-input" id="ptwWorkers" placeholder="e.g. Ahmad, Raj, Lim"></div>
      <div class="form-group"><label>Trade / Company</label><input class="form-input" id="ptwCompany" placeholder="e.g. ABC Contractors"></div>

      <h3 style="margin:16px 0 8px;font-size:14px">Safety Checklist</h3>
      <div id="checklistArea"><p style="color:var(--text-muted);font-size:13px">Select a PTW type to load checklist items...</p></div>

      <div class="form-group" style="margin-top:16px"><label>Photos</label>
        <div class="photo-upload" onclick="document.getElementById('ptwPhotos').click()">📷 Click to upload photos<input type="file" id="ptwPhotos" accept="image/*" multiple></div>
        <div class="photo-grid" id="ptwPhotoPreview"></div>
      </div>

      <div class="form-group"><label>Supervisor Signature</label>
        <div class="sig-pad"><canvas id="sigCanvas"></canvas><button class="sig-clear" onclick="sigPad.clear()">Clear</button></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('modalNew')">Cancel</button>
      <button class="btn btn-primary" onclick="submitPTW()">Submit PTW →</button>
    </div>
  </div>
</div>

<!-- View PTW Modal -->
<div class="modal-backdrop" id="modalView">
  <div class="modal" style="max-width:740px">
    <div class="modal-head"><h2 id="viewTitle">PTW Details</h2><button class="modal-close" onclick="closeModal('modalView')">✕</button></div>
    <div class="modal-body" id="viewBody"></div>
    <div class="modal-foot" id="viewFoot"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
if (!initPage('ptw')) throw '';
let allData = [], sigPad;
const user = Auth.get();

// Show add button for Supervisor/Admin
if (Auth.hasRole('supervisor','admin')) document.getElementById('addBtn').style.display = '';

const demoData = [
  {id:'PTW-247',type:'Hot Work',location:'Block A L5',status:'Active',startDate:'2026-04-30T08:00',endDate:'2026-05-02T17:00',supervisor:'Ahmad',pic:'Raj',company:'ABC Contractors',workers:'Ali, Tan, Kumar'},
  {id:'PTW-246',type:'Confined Space',location:'Block B B1',status:'Pending PIC',startDate:'2026-04-29T07:00',endDate:'2026-05-01T16:00',supervisor:'Ahmad',pic:'Lim',company:'XYZ Pte Ltd',workers:'Wong, Lee'},
  {id:'PTW-245',type:'Electrical',location:'Block C L3',status:'Pending EHS',startDate:'2026-04-28T08:00',endDate:'2026-04-30T17:00',supervisor:'Lim',pic:'Raj',company:'PowerTech',workers:'Samy, Ravi'},
  {id:'PTW-244',type:'General',location:'Block A L2',status:'Closed',startDate:'2026-04-27T08:00',endDate:'2026-04-28T17:00',supervisor:'Ali',pic:'Wong',company:'BuildCo',workers:'Kumar, Das'},
  {id:'PTW-243',type:'Excavation',location:'Block D G',status:'Expired',startDate:'2026-04-20T07:00',endDate:'2026-04-26T16:00',supervisor:'Tan',pic:'Ahmad',company:'GroundWorks',workers:'Raj, Ali, Lim'},
  {id:'PTW-242',type:'Hot Work',location:'Block B L4',status:'Pending PM',startDate:'2026-04-25T08:00',endDate:'2026-04-28T17:00',supervisor:'Kumar',pic:'Lim',company:'WeldPro',workers:'Das, Wong'},
  {id:'PTW-241',type:'Working at Height',location:'Block C Roof',status:'Approved',startDate:'2026-05-01T07:00',endDate:'2026-05-03T16:00',supervisor:'Ahmad',pic:'Raj',company:'HeightSafe',workers:'Ali, Tan'},
  {id:'PTW-240',type:'Confined Space',location:'Block A B2',status:'Rejected',startDate:'2026-04-22T08:00',endDate:'2026-04-24T17:00',supervisor:'Wong',pic:'Lim',company:'SubCon',workers:'Lee, Samy'},
];

async function load() {
  showLoad('Loading PTW...');
  let d = await API.get('getPTW');
  allData = (d && d.items) ? d.items : demoData;
  renderTable(allData);
  hideLoad();
  // Load projects and PICs for the form
  loadFormOptions();
}

function renderTable(items) {
  document.getElementById('tbl').innerHTML = items.length ? items.map(r => `<tr>
    <td style="color:var(--yellow);font-weight:600;cursor:pointer" onclick="viewPTW('${r.id}')">${r.id}</td>
    <td>${r.type}</td><td>${r.location}</td><td>${statusBadge(r.status)}</td>
    <td>${fmtDate(r.startDate)}</td><td>${r.supervisor}</td>
    <td><button class="btn btn-secondary btn-sm" onclick="viewPTW('${r.id}')">View</button></td>
  </tr>`).join('') : '<tr><td colspan="7" class="empty">No PTW records found</td></tr>';
}

function filter() {
  const st = document.getElementById('fStatus').value;
  const ty = document.getElementById('fType').value;
  const q = document.getElementById('fSearch').value.toLowerCase();
  renderTable(allData.filter(r =>
    (!st || r.status === st) && (!ty || r.type === ty) &&
    (!q || Object.values(r).some(v => String(v).toLowerCase().includes(q)))
  ));
}

async function loadFormOptions() {
  try {
    const projects = await API.get('getProjects');
    if (projects && projects.items) {
      const sel = document.getElementById('ptwProject');
      projects.items.forEach(p => { const o = document.createElement('option'); o.value = p.name; o.textContent = p.name; sel.appendChild(o); });
    }
    const users = await API.get('getUsers', { role: 'PIC' });
    if (users && users.items) {
      const sel = document.getElementById('ptwPIC');
      users.items.forEach(u => { const o = document.createElement('option'); o.value = u.username; o.textContent = u.username; sel.appendChild(o); });
    }
  } catch(e) {}
}

function openNewPTW() {
  openModal('modalNew');
  sigPad = new SignaturePad('sigCanvas');
  setupPhotoUpload('ptwPhotos', 'ptwPhotoPreview');
}

async function loadChecklist() {
  const type = document.getElementById('ptwType').value;
  if (!type) { document.getElementById('checklistArea').innerHTML = '<p style="color:var(--text-muted);font-size:13px">Select a PTW type...</p>'; return; }
  let items = null;
  try { const d = await API.get('getChecklist', { type }); if (d && d.items) items = d.items; } catch(e) {}
  if (!items) items = ['PPE worn correctly','Work area barricaded','Fire extinguisher available','Gas test conducted','Ventilation adequate','Supervisor briefed workers','Emergency plan communicated'];
  document.getElementById('checklistArea').innerHTML = `<table class="checklist-table"><thead><tr><th style="width:50%">Item</th><th>Yes</th><th>No</th><th>N/A</th></tr></thead><tbody>
    ${items.map((item, i) => `<tr><td class="item-text">${item}</td>
      <td><div class="checklist-opts"><label><input type="radio" name="cl${i}" value="Yes"><span>Yes</span></label></div></td>
      <td><div class="checklist-opts"><label><input type="radio" name="cl${i}" value="No"><span>No</span></label></div></td>
      <td><div class="checklist-opts"><label><input type="radio" name="cl${i}" value="N/A"><span>N/A</span></label></div></td>
    </tr>`).join('')}</tbody></table>`;
}

async function submitPTW() {
  const type = document.getElementById('ptwType').value;
  const location = document.getElementById('ptwLocation').value;
  if (!type || !location) { toast('Please fill in type and location', 'err'); return; }
  // Gather checklist
  const clItems = document.querySelectorAll('.checklist-table tbody tr');
  const checklist = Array.from(clItems).map((tr, i) => {
    const sel = tr.querySelector(`input[name="cl${i}"]:checked`);
    return { item: tr.querySelector('.item-text').textContent, value: sel ? sel.value : '' };
  });
  const data = {
    type, location,
    startDate: document.getElementById('ptwStart').value,
    endDate: document.getElementById('ptwEnd').value,
    project: document.getElementById('ptwProject').value,
    pic: document.getElementById('ptwPIC').value,
    description: document.getElementById('ptwDesc').value,
    workers: document.getElementById('ptwWorkers').value,
    company: document.getElementById('ptwCompany').value,
    checklist: JSON.stringify(checklist),
    signature: sigPad && !sigPad.isEmpty() ? sigPad.toDataURL() : '',
    submittedBy: user.username,
    submittedRole: user.role
  };
  showLoad('Submitting PTW...');
  const r = await API.post('submitPTW', data);
  hideLoad();
  if (r && r.success) { toast('PTW submitted successfully!', 'ok'); closeModal('modalNew'); load(); }
  else { toast(r?.error || 'Submission failed', 'err'); }
}

function viewPTW(id) {
  const ptw = allData.find(r => r.id === id);
  if (!ptw) return;
  document.getElementById('viewTitle').textContent = ptw.id + ' — ' + ptw.type;
  document.getElementById('viewBody').innerHTML = `
    <div class="form-row"><div class="form-group"><label>Type</label><p>${ptw.type}</p></div><div class="form-group"><label>Location</label><p>${ptw.location}</p></div></div>
    <div class="form-row"><div class="form-group"><label>Status</label><p>${statusBadge(ptw.status)}</p></div><div class="form-group"><label>Supervisor</label><p>${ptw.supervisor}</p></div></div>
    <div class="form-row"><div class="form-group"><label>Start</label><p>${fmtDate(ptw.startDate)}</p></div><div class="form-group"><label>End</label><p>${fmtDate(ptw.endDate)}</p></div></div>
    <div class="form-row"><div class="form-group"><label>Company</label><p>${ptw.company || '-'}</p></div><div class="form-group"><label>Workers</label><p>${ptw.workers || '-'}</p></div></div>
    ${ptw.description ? `<div class="form-group"><label>Description</label><p>${ptw.description}</p></div>` : ''}
  `;
  // Action buttons based on role and status
  let actions = '<button class="btn btn-secondary" onclick="closeModal(\'modalView\')">Close</button>';
  const st = ptw.status;
  if (st === 'Pending PIC' && Auth.hasRole('pic','admin')) actions += ` <button class="btn btn-success btn-sm" onclick="approvePTW('${id}','PIC')">✓ Approve (PIC)</button>`;
  if (st === 'Pending EHS' && Auth.hasRole('safety','admin')) actions += ` <button class="btn btn-success btn-sm" onclick="approvePTW('${id}','EHS')">✓ Approve (EHS)</button>`;
  if (st === 'Pending PM' && Auth.hasRole('pm','admin')) actions += ` <button class="btn btn-success btn-sm" onclick="approvePTW('${id}','PM')">✓ Final Approve</button>`;
  if (['Pending PIC','Pending EHS','Pending PM'].includes(st)) actions += ` <button class="btn btn-danger btn-sm" onclick="rejectPTW('${id}')">✕ Reject</button>`;
  if (st === 'Active' && Auth.hasRole('pm','admin')) actions += ` <button class="btn btn-danger btn-sm" onclick="revokePTW('${id}')">⛔ Revoke</button>`;
  if (st === 'Active' && Auth.hasRole('supervisor','admin')) actions += ` <button class="btn btn-success btn-sm" onclick="closePTW('${id}')">Close PTW</button>`;
  actions += ` <button class="btn btn-secondary btn-sm" onclick="downloadPDF('${id}')">📄 PDF</button>`;
  document.getElementById('viewFoot').innerHTML = actions;
  openModal('modalView');
}

async function approvePTW(id, stage) { showLoad('Approving...'); await API.post('approvePTW', {id, stage, approver: user.username}); hideLoad(); toast('Approved!','ok'); closeModal('modalView'); load(); }
async function rejectPTW(id) { const reason = prompt('Rejection reason:'); if (!reason) return; showLoad('Rejecting...'); await API.post('rejectPTW', {id, reason, rejectedBy: user.username}); hideLoad(); toast('Rejected','warn'); closeModal('modalView'); load(); }
async function revokePTW(id) { if (!confirm('Revoke this PTW? This will stop all work.')) return; showLoad('Revoking...'); await API.post('revokePTW', {id, revokedBy: user.username}); hideLoad(); toast('Revoked','warn'); closeModal('modalView'); load(); }
async function closePTW(id) { showLoad('Closing...'); await API.post('closePTW', {id, closedBy: user.username}); hideLoad(); toast('PTW closed','ok'); closeModal('modalView'); load(); }
async function downloadPDF(id) { toast('Generating PDF...','info'); window.open(CONFIG.GAS_URL + '?action=ptwPDF&id=' + id, '_blank'); }

load();
</script>
</body>
</html>
