<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CMS</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .project-section { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 16px; }
    .project-header { background: var(--navy); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
    .project-header h3 { color: var(--yellow); margin: 0; font-size: 1rem; }
    .project-body { padding: 16px 20px; background: white; }
    .mini-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .mini-stat { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 16px; text-align: center; min-width: 80px; flex: 1; }
    .mini-stat .val { font-size: 1.4rem; font-weight: 800; color: var(--navy); font-family: var(--font-mono); }
    .mini-stat .lbl { font-size: 0.65rem; color: var(--text-light); text-transform: uppercase; font-weight: 600; margin-top: 2px; }
    .company-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 0.85rem; }
    .company-row:last-child { border-bottom: none; }
    .expiry-banner { background: linear-gradient(135deg, #FEF2F2, #FEE2E2); border: 2px solid var(--red); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 16px; }
    .expiry-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(239,68,68,0.2); font-size: 0.85rem; }
    .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .overview-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; text-align: center; position: relative; overflow: hidden; }
    .overview-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
    .overview-card.ptw::before { background: #3B82F6; }
    .overview-card.tbm::before { background: #FBBF24; }
    .overview-card.safety::before { background: #22C55E; }
    .overview-card.active::before { background: #8B5CF6; }
    .overview-card.expiry::before { background: #EF4444; }
    .overview-card .ov-val { font-size: 2rem; font-weight: 800; font-family: var(--font-mono); color: var(--navy); }
    .overview-card .ov-lbl { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; font-weight: 600; letter-spacing: 0.04em; margin-top: 4px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="icon">🏗️</span> CMS</div>
    <button class="nav-toggle">☰</button>
    <div class="navbar-links">
        <a href="dashboard.html" class="active">📊 Dashboard</a>
        <div class="nav-dropdown" id="ddSafety">
          <button class="nav-dropdown-btn" onclick="toggleDropdown('ddSafety')">🛡️ HSE Safety ▾</button>
          <div class="nav-dropdown-menu">
            <a href="ptw.html">📋 Permit to Work (PTW)</a>
            <a href="tbm.html">🔧 Toolbox Meeting (TBM)</a>
            <a href="safety.html">🛡️ Safety Inspection</a>
          </div>
        </div>
        <div class="nav-dropdown" id="ddQuality">
          <button class="nav-dropdown-btn" onclick="toggleDropdown('ddQuality')">🔍 Quality ▾</button>
          <div class="nav-dropdown-menu">
            <a href="qaqc.html">🔍 Quality Inspection</a>
            <a href="defect.html">🐛 Defect Management</a>
          </div>
        </div>
        <a href="admin.html">⚙️ Admin</a>
      </div>
    <div class="navbar-user"></div>
  </nav>
  <div class="hazard-stripe"></div>
  <script>
    function toggleDropdown(id){var a=document.querySelectorAll(".nav-dropdown");a.forEach(function(d){if(d.id!==id)d.classList.remove("open")});document.getElementById(id).classList.toggle("open")}
    document.addEventListener("click",function(e){if(!e.target.closest(".nav-dropdown"))document.querySelectorAll(".nav-dropdown").forEach(function(d){d.classList.remove("open")})});
  </script>

  <div class="page-container">
    <div class="page-header d-flex justify-between items-center flex-wrap gap-md">
      <div>
        <h1>📊 HSE Safety Dashboard</h1>
        <p>Project-wise & company-wise overview</p>
      </div>
      <div class="d-flex gap-sm">
        <select id="filterProject" onchange="loadDashboard()" style="min-height:40px;font-size:0.85rem;padding:6px 14px;border-radius:var(--radius-md)">
          <option value="">🏗️ All Projects</option>
        </select>
        <select id="filterCompany" onchange="loadDashboard()" style="min-height:40px;font-size:0.85rem;padding:6px 14px;border-radius:var(--radius-md)">
          <option value="">🏢 All Companies</option>
        </select>
        <button class="btn btn-primary" onclick="loadDashboard()">🔄 Refresh</button>
      </div>
    </div>

    <!-- Expiry Alerts -->
    <div id="expiryAlerts"></div>

    <!-- Overview Stats -->
    <div class="overview-grid" id="overviewStats"></div>

    <!-- Charts Row -->
    <div class="grid-2" style="margin-bottom:24px">
      <div class="card">
        <h3 style="margin-bottom:12px">📋 PTW by Work Type</h3>
        <canvas id="chartType" height="260"></canvas>
      </div>
      <div class="card">
        <h3 style="margin-bottom:12px">📋 PTW by Status</h3>
        <canvas id="chartStatus" height="260"></canvas>
      </div>
    </div>

    <!-- Project-wise Breakdown -->
    <div class="section-divider"><span>Project-wise Breakdown</span></div>
    <div id="projectBreakdown"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const user = requireLogin();
    let charts = {};

    if (user) {
      setupNavbar("dashboard.html");
      loadDashboard();
    }

    async function loadDashboard() {
      const pFilter = document.getElementById("filterProject").value;
      const cFilter = document.getElementById("filterCompany").value;

      let ptwData = [], tbmData = [], safetyData = [];
      try {
        const [pR, tR, sR] = await Promise.all([
          apiGet("ptw-list"), apiGet("tbm-list"), apiGet("safety-list")
        ]);
        if (pR && pR.data) ptwData = pR.data;
        if (tR && tR.data) tbmData = tR.data;
        if (sR && sR.data) safetyData = sR.data;
      } catch (e) {}

      // Populate filter dropdowns (once)
      populateFilter("filterProject", ptwData, "Project");
      populateFilter("filterCompany", ptwData, "Company");

      // Apply filters
      if (pFilter) {
        ptwData = ptwData.filter(r => (r.Project || r.project) === pFilter);
        tbmData = tbmData.filter(r => (r.Project || r.project) === pFilter);
        safetyData = safetyData.filter(r => (r.Project || r.project) === pFilter);
      }
      if (cFilter) {
        ptwData = ptwData.filter(r => (r.Company || r.company) === cFilter);
      }

      // Expiry alerts
      const now = new Date();
      const twoH = new Date(now.getTime() + 2*60*60*1000);
      const expiring = ptwData.filter(r => {
        if ((r.Status||r.status) !== "approved") return false;
        const end = new Date(r.ValidityEnd||r.validityEnd);
        return end > now && end <= twoH;
      });

      const alertDiv = document.getElementById("expiryAlerts");
      if (expiring.length > 0) {
        alertDiv.innerHTML = `<div class="expiry-banner">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:1.4rem">⚠️</span><strong style="color:var(--red);font-size:1rem">PTW Expiring Soon (${expiring.length})</strong></div>
          ${expiring.map(r => `<div class="expiry-item"><div><span class="mono fw-700">${r.ID||r.id}</span> — ${r.Project||r.project} — ${r.Location||r.location}</div><div style="color:var(--red);font-weight:600">Expires: ${new Date(r.ValidityEnd||r.validityEnd).toLocaleTimeString()}</div></div>`).join("")}
        </div>`;
      } else { alertDiv.innerHTML = ""; }

      // Overview stats
      const active = ptwData.filter(r => (r.Status||r.status)==="approved").length;
      const pending = ptwData.filter(r => (r.Status||r.status||"").startsWith("pending")).length;
      document.getElementById("overviewStats").innerHTML = `
        <div class="overview-card ptw"><div class="ov-val">${ptwData.length}</div><div class="ov-lbl">Total PTW</div></div>
        <div class="overview-card active"><div class="ov-val">${active}</div><div class="ov-lbl">Active PTW</div></div>
        <div class="overview-card" style="--c:#F97316"><div class="ov-val" style="color:var(--orange)">${pending}</div><div class="ov-lbl">Pending Approval</div></div>
        <div class="overview-card tbm"><div class="ov-val">${tbmData.length}</div><div class="ov-lbl">Total TBM</div></div>
        <div class="overview-card safety"><div class="ov-val">${safetyData.length}</div><div class="ov-lbl">Safety Inspections</div></div>
        <div class="overview-card expiry"><div class="ov-val" style="color:var(--red)">${expiring.length}</div><div class="ov-lbl">⚠️ Expiring Soon</div></div>
      `;

      // Charts
      const typeCounts = {};
      ptwData.forEach(r => { const t = r.Type||r.type||"Other"; typeCounts[t] = (typeCounts[t]||0)+1; });
      const typeColors = {GEN:"#3B82F6",HW:"#EF4444",WAH:"#F97316",CS:"#8B5CF6",LW:"#22C55E",EXC:"#F59E0B"};
      renderChart("chartType","bar",Object.keys(typeCounts),Object.values(typeCounts),Object.keys(typeCounts).map(t=>typeColors[t]||"#94A3B8"));

      const statusCounts = {};
      ptwData.forEach(r => { const s = r.Status||r.status||""; statusCounts[s] = (statusCounts[s]||0)+1; });
      const sColors = {pending_pic:"#F97316",pending_ehs:"#F97316",pending_pm:"#F97316",approved:"#22C55E",closed:"#64748B",rejected:"#EF4444",revoked:"#EF4444"};
      renderChart("chartStatus","doughnut",
        Object.keys(statusCounts).map(s=>s.replace(/_/g," ").toUpperCase()),
        Object.values(statusCounts),
        Object.keys(statusCounts).map(s=>sColors[s]||"#94A3B8"));

      // Project-wise breakdown
      const projMap = {};
      ptwData.forEach(r => {
        const p = r.Project||r.project||"Unknown";
        const c = r.Company||r.company||"Unknown";
        const t = r.Type||r.type||"Other";
        const s = r.Status||r.status||"unknown";
        if (!projMap[p]) projMap[p] = { total:0, types:{}, statuses:{}, companies:{} };
        projMap[p].total++;
        projMap[p].types[t] = (projMap[p].types[t]||0)+1;
        projMap[p].statuses[s] = (projMap[p].statuses[s]||0)+1;
        if (!projMap[p].companies[c]) projMap[p].companies[c] = {total:0,types:{}};
        projMap[p].companies[c].total++;
        projMap[p].companies[c].types[t] = (projMap[p].companies[c].types[t]||0)+1;
      });

      // Add TBM count per project
      tbmData.forEach(r => {
        const p = r.Project||r.project||"Unknown";
        if (!projMap[p]) projMap[p] = { total:0, types:{}, statuses:{}, companies:{}, tbm:0 };
        projMap[p].tbm = (projMap[p].tbm||0)+1;
      });

      const bd = document.getElementById("projectBreakdown");
      if (Object.keys(projMap).length === 0) {
        bd.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No data yet. Submit your first PTW!</p></div>';
      } else {
        bd.innerHTML = Object.entries(projMap).map(([proj, d]) => `
          <div class="project-section">
            <div class="project-header">
              <h3>🏗️ ${proj}</h3>
              <div style="display:flex;gap:12px;font-size:0.8rem">
                <span>📋 PTW: <strong>${d.total}</strong></span>
                <span>🔧 TBM: <strong>${d.tbm||0}</strong></span>
              </div>
            </div>
            <div class="project-body">
              <div class="mini-stats">
                ${Object.entries(d.types).map(([t,c]) => `<div class="mini-stat"><div class="val" style="color:${typeColors[t]||'var(--navy)'}">${c}</div><div class="lbl">${t}</div></div>`).join("")}
                ${Object.entries(d.statuses).map(([s,c]) => {
                  const col = s==="approved"?"var(--green)":s.includes("pending")?"var(--orange)":s==="rejected"||s==="revoked"?"var(--red)":"var(--text-muted)";
                  return `<div class="mini-stat"><div class="val" style="color:${col}">${c}</div><div class="lbl">${s.replace(/_/g," ")}</div></div>`;
                }).join("")}
              </div>
              ${Object.keys(d.companies).length > 0 ? `
                <div style="margin-top:14px">
                  <div style="font-size:0.75rem;font-weight:700;color:var(--text-light);text-transform:uppercase;margin-bottom:6px">By Company</div>
                  ${Object.entries(d.companies).map(([co,cd]) => `
                    <div class="company-row">
                      <div><strong>🏢 ${co}</strong> — ${cd.total} PTW</div>
                      <div>${Object.entries(cd.types).map(([t,c])=>`<span style="background:${typeColors[t]||'#ccc'};color:white;padding:2px 8px;border-radius:10px;font-size:0.7rem;margin-left:4px">${t}: ${c}</span>`).join("")}</div>
                    </div>
                  `).join("")}
                </div>
              ` : ''}
            </div>
          </div>
        `).join("");
      }
    }

    function populateFilter(selectId, data, field) {
      const el = document.getElementById(selectId);
      if (el.options.length > 1) return;
      const vals = [...new Set(data.map(r => r[field]||r[field.toLowerCase()]).filter(Boolean))];
      vals.sort();
      vals.forEach(v => { el.innerHTML += `<option value="${v}">${v}</option>`; });
    }

    function renderChart(id, type, labels, values, colors) {
      if (charts[id]) charts[id].destroy();
      charts[id] = new Chart(document.getElementById(id).getContext("2d"), {
        type,
        data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: type==="doughnut"?2:0, borderColor:"#fff", borderRadius: type==="bar"?6:0 }] },
        options: { responsive:true, maintainAspectRatio:false, plugins: { legend: { position: type==="doughnut"?"bottom":"none", labels:{font:{family:"'Plus Jakarta Sans'",size:11},padding:10} } }, scales: type==="bar"?{y:{beginAtZero:true,ticks:{stepSize:1}}}:{}, cutout: type==="doughnut"?"55%":undefined }
      });
    }
  </script>
</body>
</html>
