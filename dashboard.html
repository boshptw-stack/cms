<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dashboard — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <h1><button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button> Dashboard <span class="pulse"></span></h1>
      <div class="topbar-actions"><button class="btn btn-secondary btn-sm" onclick="load()">↻ Refresh</button></div>
    </div>
    <div class="content">
      <div class="stats-row" id="stats">
        <div class="stat c-yellow"><div class="stat-icon">📋</div><div class="stat-label">Total PTW</div><div class="stat-value" data-v="0">0</div><div class="stat-trend up">↑ loading</div></div>
        <div class="stat c-green"><div class="stat-icon">✅</div><div class="stat-label">Active PTW</div><div class="stat-value" data-v="0">0</div><div class="stat-trend up">↑ live</div></div>
        <div class="stat c-purple"><div class="stat-icon">👷</div><div class="stat-label">TBM Sessions</div><div class="stat-value" data-v="0">0</div></div>
        <div class="stat c-cyan"><div class="stat-icon">🛡️</div><div class="stat-label">Safety Inspections</div><div class="stat-value" data-v="0">0</div></div>
        <div class="stat c-amber"><div class="stat-icon">⏳</div><div class="stat-label">Pending</div><div class="stat-value" data-v="0">0</div></div>
        <div class="stat c-red"><div class="stat-icon">⚠️</div><div class="stat-label">Critical Findings</div><div class="stat-value" data-v="0">0</div></div>
      </div>
      <div class="grid-2">
        <div class="card"><div class="card-header"><h3>Monthly Activity</h3><div class="card-legend"><div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>PTW</div><div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>TBM</div><div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Inspections</div></div></div><div class="chart-wrap"><canvas id="chTrend"></canvas></div></div>
        <div class="card"><div class="card-header"><h3>PTW by Status</h3></div><div class="chart-wrap"><canvas id="chStatus"></canvas></div></div>
      </div>
      <div class="grid-2">
        <div class="card"><div class="card-header"><h3>PTW by Type</h3></div><div class="chart-wrap"><canvas id="chType"></canvas></div></div>
        <div class="card"><div class="card-header"><h3>Safety Inspection Results</h3></div><div class="chart-wrap"><canvas id="chInsp"></canvas></div></div>
      </div>
      <div class="table-card">
        <div class="table-bar"><h3>Recent Permits to Work</h3><a href="ptw.html" class="btn btn-secondary btn-sm">View All →</a></div>
        <table class="dt"><thead><tr><th>ID</th><th>Type</th><th>Location</th><th>Status</th><th>Date</th><th>Supervisor</th></tr></thead><tbody id="tblPTW"></tbody></table>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script>
if (!initPage('dashboard')) throw '';
let ch = {};
const DEMO = {
  stats: {totalPTW:247,activePTW:38,tbm:156,inspections:89,pending:12,critical:5},
  trend: [{m:'Jan',p:18,t:12,i:8},{m:'Feb',p:22,t:15,i:10},{m:'Mar',p:28,t:18,i:12},{m:'Apr',p:35,t:22,i:14},{m:'May',p:42,t:25,i:16},{m:'Jun',p:38,t:28,i:11},{m:'Jul',p:45,t:30,i:18}],
  byStatus: {Active:38,Closed:185,Expired:16,Pending:8},
  byType: {'Hot Work':45,'Confined Space':32,Electrical:28,Excavation:22,General:120},
  inspResults: {Pass:72,Fail:8,Partial:9},
  recent: [
    {id:'PTW-247',type:'Hot Work',loc:'Block A L5',status:'Active',date:'2026-04-30',sup:'Ahmad'},
    {id:'PTW-246',type:'Confined Space',loc:'Block B B1',status:'Pending',date:'2026-04-29',sup:'Raj'},
    {id:'PTW-245',type:'Electrical',loc:'Block C L3',status:'Active',date:'2026-04-28',sup:'Lim'},
    {id:'PTW-244',type:'General',loc:'Block A L2',status:'Closed',date:'2026-04-27',sup:'Ali'},
    {id:'PTW-243',type:'Excavation',loc:'Block D G',status:'Expired',date:'2026-04-26',sup:'Tan'}
  ]
};

async function load() {
  showLoad('Loading dashboard...');
  let d = await API.get('getDashboard');
  if (!d || !d.stats) d = DEMO;
  render(d);
  hideLoad();
}

function render(d) {
  const s = d.stats;
  const vals = [s.totalPTW, s.activePTW, s.tbm, s.inspections, s.pending, s.critical];
  document.querySelectorAll('.stat-value').forEach((el, i) => { el.dataset.v = vals[i] || 0; });
  initReveal(); initCountUps();

  // Trend
  if (ch.trend) ch.trend.destroy();
  const ctx1 = document.getElementById('chTrend').getContext('2d');
  ch.trend = new Chart(ctx1, {type:'line', data:{labels:d.trend.map(t=>t.m), datasets:[
    {label:'PTW',data:d.trend.map(t=>t.p),borderColor:C.yellow.border,backgroundColor:gradient(ctx1,C.yellow),fill:true,borderWidth:2,pointRadius:3,pointBackgroundColor:C.yellow.border},
    {label:'TBM',data:d.trend.map(t=>t.t),borderColor:C.purple.border,backgroundColor:'transparent',borderWidth:2,pointRadius:3,borderDash:[5,3]},
    {label:'Inspections',data:d.trend.map(t=>t.i),borderColor:C.green.border,backgroundColor:'transparent',borderWidth:2,pointRadius:3}
  ]}, options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true}}}});

  // Status
  if (ch.status) ch.status.destroy();
  ch.status = new Chart(document.getElementById('chStatus'), {type:'doughnut', data:{labels:Object.keys(d.byStatus), datasets:[{data:Object.values(d.byStatus),backgroundColor:[C.green.solid,C.blue.solid,C.red.solid,C.yellow.solid],borderWidth:0,hoverOffset:6}]}, options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:true,position:'right',labels:{boxWidth:8,padding:10,font:{size:11}}}}}});

  // Type
  if (ch.type) ch.type.destroy();
  ch.type = new Chart(document.getElementById('chType'), {type:'bar', data:{labels:Object.keys(d.byType), datasets:[{data:Object.values(d.byType),backgroundColor:[C.yellow.bg,C.red.bg,C.blue.bg,C.purple.bg,C.cyan.bg],borderColor:[C.yellow.border,C.red.border,C.blue.border,C.purple.border,C.cyan.border],borderWidth:1}]}, options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',scales:{x:{beginAtZero:true},y:{grid:{display:false}}}}});

  // Inspection results
  if (ch.insp) ch.insp.destroy();
  ch.insp = new Chart(document.getElementById('chInsp'), {type:'doughnut', data:{labels:Object.keys(d.inspResults), datasets:[{data:Object.values(d.inspResults),backgroundColor:[C.green.solid,C.red.solid,C.yellow.solid],borderWidth:0,hoverOffset:6}]}, options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:true,position:'right',labels:{boxWidth:8,padding:10,font:{size:11}}}}}});

  // Recent PTW
  document.getElementById('tblPTW').innerHTML = d.recent.map(r => `<tr><td style="color:var(--yellow);font-weight:600">${r.id}</td><td>${r.type}</td><td>${r.loc}</td><td>${statusBadge(r.status)}</td><td>${fmtDate(r.date)}</td><td>${r.sup}</td></tr>`).join('');
}
load();
</script>
</body>
</html>
