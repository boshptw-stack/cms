<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dashboard — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <h1><button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button> Dashboard</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" id="newPtwBtn" style="display:none" onclick="location.href='ptw.html?new=1'">+ NEW PTW</button>
        <button class="btn btn-secondary btn-sm" onclick="load()">↻ Refresh</button>
      </div>
    </div>
    <div class="content">
      <p style="color:var(--text-sec);margin-bottom:16px;font-size:13px">Bosh Engineering Pte. Ltd.</p>

      <!-- Stat cards matching screenshot -->
      <div class="stats-row" style="grid-template-columns:repeat(5,1fr)">
        <div class="stat c-blue"><div class="stat-value" data-v="0">0</div><div class="stat-label">Total PTWs</div></div>
        <div class="stat c-yellow"><div class="stat-value" data-v="0">0</div><div class="stat-label">⚡ My Tasks</div></div>
        <div class="stat c-orange"><div class="stat-value" data-v="0">0</div><div class="stat-label">Pending</div></div>
        <div class="stat c-green"><div class="stat-value" data-v="0">0</div><div class="stat-label">Active</div></div>
        <div class="stat c-blue"><div class="stat-value" data-v="0">0</div><div class="stat-label">Closed</div></div>
      </div>

      <!-- My Tasks heading + sort + date filters -->
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:14px">
        <h2 style="font-size:16px;font-weight:700;color:var(--navy)">⚡ My Tasks (<span id="myTaskCount">0</span>)</h2>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" id="sortNewest" onclick="sortPTW('newest')">↓ Newest</button>
          <button class="btn btn-secondary btn-sm" id="sortOldest" onclick="sortPTW('oldest')">↑ Oldest</button>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:11px;color:var(--text-muted);font-weight:600">FROM:</span>
            <input type="date" class="form-input" id="dateFrom" style="width:140px;padding:6px 10px;font-size:12px" onchange="filterPTW()">
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:11px;color:var(--text-muted);font-weight:600">TO:</span>
            <input type="date" class="form-input" id="dateTo" style="width:140px;padding:6px 10px;font-size:12px" onchange="filterPTW()">
          </div>
          <span style="font-size:12px;color:var(--text-muted)" id="countLabel">0 / 0 PTWs</span>
        </div>
      </div>

      <!-- Tab filters like BOSH PTW -->
      <div class="tab-group">
        <button class="tab-btn active" onclick="setTab(this,'mytasks')">⚡ MY TASKS</button>
        <button class="tab-btn" onclick="setTab(this,'all')">ALL</button>
        <button class="tab-btn" onclick="setTab(this,'pending')">PENDING</button>
        <button class="tab-btn" onclick="setTab(this,'active')">ACTIVE</button>
        <button class="tab-btn" onclick="setTab(this,'closed')">CLOSED</button>
        <button class="tab-btn" onclick="setTab(this,'rejected')">REJECTED</button>
      </div>

      <!-- PTW List -->
      <div id="ptwList"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
if (!initPage('dashboard')) throw '';
const user = Auth.get();
if (Auth.hasRole('supervisor','admin')) document.getElementById('newPtwBtn').style.display = '';

let allPTW = [], currentTab = 'mytasks', currentSort = 'newest';

const demoPTW = [
  {id:'PTW-005',type:'Hot Work',location:'Block A L5',status:'Active',startDate:'2026-05-01T08:00',endDate:'2026-05-03T17:00',submittedBy:'supervisor',pic:'pic',ehs:'',pm:'',company:'ABC Contractors',workers:'Ahmad, Raj',project:'Block A Residential',description:'Welding work on steel beams'},
  {id:'PTW-004',type:'Confined Space',location:'Block B B1',status:'Pending PIC',startDate:'2026-04-30T07:00',endDate:'2026-05-01T16:00',submittedBy:'supervisor',pic:'pic',ehs:'',pm:'',company:'XYZ Pte Ltd',workers:'Lim, Wong',project:'Block B Commercial',description:'Tank cleaning'},
  {id:'PTW-003',type:'Electrical',location:'Block C L3',status:'Closed',startDate:'2026-04-28T08:00',endDate:'2026-04-29T17:00',submittedBy:'supervisor',pic:'pic',ehs:'safety',pm:'pm',company:'PowerTech',workers:'Samy, Ravi',project:'Block C Mixed',description:'Cable tray installation'},
  {id:'PTW-002',type:'Working at Height',location:'Block A Roof',status:'Closed',startDate:'2026-04-26T07:00',endDate:'2026-04-27T16:00',submittedBy:'supervisor',pic:'pic',ehs:'safety',pm:'pm',company:'HeightSafe',workers:'Ali, Tan',project:'Block A Residential',description:'Roof waterproofing'},
  {id:'PTW-001',type:'General',location:'Block D G',status:'Closed',startDate:'2026-04-24T08:00',endDate:'2026-04-25T17:00',submittedBy:'supervisor',pic:'pic',ehs:'safety',pm:'pm',company:'BuildCo',workers:'Kumar, Das',project:'Block D Industrial',description:'General maintenance'},
];

async function load() {
  showLoad('Loading PTW data...');
  let d = await API.get('getPTW');
  allPTW = (d && d.items && d.items.length) ? d.items : demoPTW;
  updateStats();
  filterPTW();
  hideLoad();
}

function updateStats() {
  const myTasks = allPTW.filter(p => isMyTask(p)).length;
  const pending = allPTW.filter(p => p.status.startsWith('Pending')).length;
  const active = allPTW.filter(p => p.status === 'Active' || p.status === 'Approved').length;
  const closed = allPTW.filter(p => p.status === 'Closed').length;
  const els = document.querySelectorAll('.stat-value');
  [allPTW.length, myTasks, pending, active, closed].forEach((v, i) => { els[i].dataset.v = v; });
  document.getElementById('myTaskCount').textContent = myTasks;
  initReveal(); initCountUps();
}

function isMyTask(p) {
  const u = user.username.toLowerCase();
  const role = user.role.toLowerCase();
  if (p.status === 'Pending PIC' && (p.pic || '').toLowerCase() === u) return true;
  if (p.status === 'Pending EHS' && role.includes('safety')) return true;
  if (p.status === 'Pending PM' && role.includes('pm')) return true;
  if (p.submittedBy && p.submittedBy.toLowerCase() === u) return true;
  if (role.includes('admin')) return true;
  return false;
}

function setTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = tab;
  filterPTW();
}

function sortPTW(dir) {
  currentSort = dir;
  document.getElementById('sortNewest').className = 'btn btn-sm ' + (dir === 'newest' ? 'btn-primary' : 'btn-secondary');
  document.getElementById('sortOldest').className = 'btn btn-sm ' + (dir === 'oldest' ? 'btn-primary' : 'btn-secondary');
  filterPTW();
}

function filterPTW() {
  let list = [...allPTW];
  // Tab filter
  if (currentTab === 'mytasks') list = list.filter(p => isMyTask(p));
  else if (currentTab === 'pending') list = list.filter(p => p.status.startsWith('Pending'));
  else if (currentTab === 'active') list = list.filter(p => p.status === 'Active' || p.status === 'Approved');
  else if (currentTab === 'closed') list = list.filter(p => p.status === 'Closed');
  else if (currentTab === 'rejected') list = list.filter(p => p.status === 'Rejected' || p.status === 'Revoked');
  // Date filter
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (from) list = list.filter(p => p.startDate >= from);
  if (to) list = list.filter(p => p.startDate <= to + 'T23:59');
  // Sort
  list.sort((a, b) => currentSort === 'newest' ? (b.startDate || '').localeCompare(a.startDate || '') : (a.startDate || '').localeCompare(b.startDate || ''));
  document.getElementById('countLabel').textContent = list.length + ' / ' + allPTW.length + ' PTWs';
  renderPTWList(list);
}

function renderPTWList(items) {
  if (!items.length) {
    document.getElementById('ptwList').innerHTML = `<div class="empty" style="padding:60px"><div class="icon">✅</div><h3>No pending tasks!</h3><p>You have no pending actions.</p></div>`;
    return;
  }
  document.getElementById('ptwList').innerHTML = items.map(p => {
    const statusColor = p.status === 'Active' || p.status === 'Approved' ? 'var(--green)' : p.status.startsWith('Pending') ? 'var(--orange)' : p.status === 'Closed' ? 'var(--blue)' : 'var(--red)';
    return `<div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);cursor:pointer" onclick="location.href='ptw.html?id=${p.id}'">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span style="font-weight:700;color:var(--navy);font-size:15px">${p.id}</span>
          ${statusBadge(p.status)}
          <span style="font-size:12px;color:var(--text-muted)">${p.type}</span>
        </div>
        <div style="font-size:12px;color:var(--text-sec)">${p.location} · ${p.company || ''} · ${fmtDate(p.startDate)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text-muted)">By: ${p.submittedBy || '-'}</div>
        ${getActionLabel(p)}
      </div>
    </div>`;
  }).join('');
}

function getActionLabel(p) {
  const u = user.username.toLowerCase();
  const role = user.role.toLowerCase();
  if (p.status === 'Pending PIC' && ((p.pic || '').toLowerCase() === u || role.includes('admin'))) return '<span style="font-size:11px;color:var(--orange);font-weight:600">Action Required →</span>';
  if (p.status === 'Pending EHS' && (role.includes('safety') || role.includes('admin'))) return '<span style="font-size:11px;color:var(--orange);font-weight:600">Action Required →</span>';
  if (p.status === 'Pending PM' && (role.includes('pm') || role.includes('admin'))) return '<span style="font-size:11px;color:var(--orange);font-weight:600">Action Required →</span>';
  return '<span style="font-size:11px;color:var(--text-muted)">View →</span>';
}

load();
</script>
</body>
</html>
