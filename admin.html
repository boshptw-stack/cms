<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <h1><button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button> ⚙️ Admin Panel</h1>
      <div class="topbar-actions"><button class="btn btn-secondary btn-sm" onclick="loadAll()">↻ Refresh</button></div>
    </div>
    <div class="content" id="adminContent">
      <div id="noAccess" style="display:none" class="empty"><div class="icon">🔒</div><h3>Access Denied</h3><p>Only Administrators can access this page.</p></div>

      <!-- Tabs -->
      <div style="display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px" id="tabs">
        <button class="btn btn-secondary btn-sm" onclick="showTab('users')" id="tabUsers" style="border-radius:var(--radius) var(--radius) 0 0">👤 Users</button>
        <button class="btn btn-secondary btn-sm" onclick="showTab('checklist')" id="tabChecklist" style="border-radius:var(--radius) var(--radius) 0 0">📋 PTW Checklists</button>
        <button class="btn btn-secondary btn-sm" onclick="showTab('projects')" id="tabProjects" style="border-radius:var(--radius) var(--radius) 0 0">🏗️ Projects</button>
      </div>

      <!-- Users Tab -->
      <div id="panelUsers">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h3 style="font-size:15px">User Management</h3>
          <button class="btn btn-primary btn-sm" onclick="openModal('modalUser')">+ Add User</button>
        </div>
        <div class="table-card show">
          <table class="dt"><thead><tr><th>Username</th><th>Role</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody id="tblUsers"></tbody></table>
        </div>
      </div>

      <!-- Checklist Tab -->
      <div id="panelChecklist" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h3 style="font-size:15px">PTW Checklist Items</h3>
          <p style="font-size:12px;color:var(--text-muted)">Edit directly in Google Sheet tab: PTW_CHECKLISTS</p>
        </div>
        <div class="filters">
          <select class="filter-select" id="clType" onchange="loadChecklists()"><option value="">All Types</option><option>Hot Work</option><option>Confined Space</option><option>Electrical</option><option>Excavation</option><option>Working at Height</option><option>General</option></select>
        </div>
        <div class="table-card show">
          <table class="dt"><thead><tr><th>#</th><th>Type</th><th>Name</th><th>Items</th></tr></thead><tbody id="tblChecklist"></tbody></table>
        </div>
      </div>

      <!-- Projects Tab -->
      <div id="panelProjects" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h3 style="font-size:15px">Projects</h3>
          <button class="btn btn-primary btn-sm" onclick="openModal('modalProject')">+ Add Project</button>
        </div>
        <div class="table-card show">
          <table class="dt"><thead><tr><th>Project</th><th>Location</th><th>Status</th></tr></thead><tbody id="tblProjects"></tbody></table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div class="modal-backdrop" id="modalUser">
  <div class="modal" style="max-width:480px">
    <div class="modal-head"><h2>Add User</h2><button class="modal-close" onclick="closeModal('modalUser')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Username</label><input class="form-input" id="newUser"></div>
      <div class="form-group"><label>Password</label><input class="form-input" id="newPass" type="password"></div>
      <div class="form-group"><label>Role</label><select class="form-input" id="newRole"><option>Supervisor</option><option>PIC</option><option>Safety Officer</option><option>Project Manager</option><option>QAQC</option><option>Administrator</option></select></div>
      <div class="form-group"><label>Email</label><input class="form-input" id="newEmail" type="email"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal('modalUser')">Cancel</button><button class="btn btn-primary" onclick="addUser()">Add User →</button></div>
  </div>
</div>

<!-- Add Project Modal -->
<div class="modal-backdrop" id="modalProject">
  <div class="modal" style="max-width:480px">
    <div class="modal-head"><h2>Add Project</h2><button class="modal-close" onclick="closeModal('modalProject')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Project Name</label><input class="form-input" id="projName"></div>
      <div class="form-group"><label>Location</label><input class="form-input" id="projLoc"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal('modalProject')">Cancel</button><button class="btn btn-primary" onclick="addProject()">Add Project →</button></div>
  </div>
</div>

<script src="app.js"></script>
<script>
if (!initPage('admin')) throw '';
const user = Auth.get();
if (!Auth.hasRole('admin','administrator')) { document.getElementById('tabs').style.display='none'; document.getElementById('panelUsers').style.display='none'; document.getElementById('noAccess').style.display=''; }

function showTab(t) {
  ['users','checklist','projects'].forEach(id => { document.getElementById('panel'+id.charAt(0).toUpperCase()+id.slice(1)).style.display = id===t?'':'none'; });
  document.querySelectorAll('#tabs button').forEach(b => b.style.background = '');
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).style.background = 'var(--yellow-dim)';
}
showTab('users');

const demoUsers = [{username:'supervisor',role:'Supervisor',email:'sup@bosh.com',status:'Active'},{username:'pic',role:'PIC',email:'pic@bosh.com',status:'Active'},{username:'safety',role:'Safety Officer',email:'safety@bosh.com',status:'Active'},{username:'pm',role:'Project Manager',email:'pm@bosh.com',status:'Active'},{username:'qaqc',role:'QAQC',email:'qaqc@bosh.com',status:'Active'},{username:'admin',role:'Administrator',email:'admin@bosh.com',status:'Active'}];
const demoProjects = [{name:'Block A Residential',location:'Jurong East',status:'Active'},{name:'Block B Commercial',location:'Tuas',status:'Active'},{name:'Block C Mixed',location:'Tampines',status:'Planning'}];

async function loadAll() { loadUsers(); loadChecklists(); loadProjects(); }
async function loadUsers() {
  let d = await API.get('getUsers');
  const users = d?.items || demoUsers;
  document.getElementById('tblUsers').innerHTML = users.map(u => `<tr><td style="font-weight:600">${u.username}</td><td>${statusBadge(u.role)}</td><td>${u.email||'-'}</td><td>${statusBadge(u.status||'Active')}</td><td><button class="btn btn-danger btn-sm" onclick="deleteUser('${u.username}')">Delete</button></td></tr>`).join('');
}
async function loadChecklists() {
  const type = document.getElementById('clType')?.value || '';
  let d = await API.get('getChecklists', {type});
  const items = d?.items || [{type:'Hot Work',name:'Default',items:['PPE check','Fire extinguisher','Gas test','Ventilation','Barricade','Supervisor briefing','Emergency plan']}];
  document.getElementById('tblChecklist').innerHTML = items.map((c,i) => `<tr><td>${i+1}</td><td>${c.type}</td><td>${c.name}</td><td style="font-size:12px;color:var(--text-muted)">${(c.items||[]).join(', ')}</td></tr>`).join('');
}
async function loadProjects() {
  let d = await API.get('getProjects');
  const projects = d?.items || demoProjects;
  document.getElementById('tblProjects').innerHTML = projects.map(p => `<tr><td style="font-weight:600">${p.name}</td><td>${p.location}</td><td>${statusBadge(p.status)}</td></tr>`).join('');
}
async function addUser() { const data={username:document.getElementById('newUser').value,password:document.getElementById('newPass').value,role:document.getElementById('newRole').value,email:document.getElementById('newEmail').value}; if(!data.username){toast('Enter username','err');return;} showLoad('Adding...'); await API.post('addUser',data); hideLoad(); toast('User added!','ok'); closeModal('modalUser'); loadUsers(); }
async function deleteUser(u) { if(!confirm('Delete '+u+'?')) return; showLoad('Deleting...'); await API.post('deleteUser',{username:u}); hideLoad(); toast('Deleted','warn'); loadUsers(); }
async function addProject() { const data={name:document.getElementById('projName').value,location:document.getElementById('projLoc').value}; if(!data.name){toast('Enter name','err');return;} showLoad('Adding...'); await API.post('addProject',data); hideLoad(); toast('Project added!','ok'); closeModal('modalProject'); loadProjects(); }
loadAll();
</script>
</body>
</html>
