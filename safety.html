<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Safety Inspection — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <h1><button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button> Safety Inspection</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openNewInspection()">+ New Inspection</button>
        <button class="btn btn-secondary btn-sm" onclick="load()">↻</button>
      </div>
    </div>
    <div class="content">
      <!-- Workflow steps -->
      <div class="workflow-steps">
        <div class="workflow-step" id="ws1"><span class="num">1</span>Add Issues</div>
        <div class="workflow-step" id="ws2"><span class="num">2</span>Rectify</div>
        <div class="workflow-step" id="ws3"><span class="num">3</span>Close</div>
      </div>
      <div class="filters">
        <select class="filter-select" id="fStatus" onchange="filter()"><option value="">All Status</option><option>Open</option><option>Rectifying</option><option>Closed</option></select>
        <select class="filter-select" id="fSev" onchange="filter()"><option value="">All Severity</option><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select>
        <input class="search-input" id="fSearch" placeholder="Search..." oninput="filter()">
      </div>
      <div class="table-card show">
        <table class="dt"><thead><tr><th>Insp #</th><th>Date</th><th>Location</th><th>Issues</th><th>Status</th><th>Inspector</th><th>Actions</th></tr></thead><tbody id="tbl"></tbody></table>
      </div>
    </div>
  </div>
</div>

<!-- New Inspection Modal -->
<div class="modal-backdrop" id="modalNew">
  <div class="modal" style="max-width:740px">
    <div class="modal-head"><h2>New Safety Inspection</h2><button class="modal-close" onclick="closeModal('modalNew')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Location</label><input class="form-input" id="siLoc" placeholder="e.g. Block A Level 3"></div>
        <div class="form-group"><label>Date</label><input class="form-input" id="siDate" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Project</label><select class="form-input" id="siProject"><option value="">Select...</option></select></div>
        <div class="form-group"><label>Contractor</label><input class="form-input" id="siContractor" placeholder="Contractor name"></div>
      </div>

      <h3 style="margin:16px 0 8px;font-size:14px">Issues Found <button class="btn btn-secondary btn-sm" onclick="addIssueRow()" style="margin-left:8px">+ Add Issue</button></h3>
      <div id="issuesList"></div>

      <div class="form-group" style="margin-top:16px"><label>Photos</label>
        <div class="photo-upload" onclick="document.getElementById('siPhotos').click()">📷 Upload photos<input type="file" id="siPhotos" accept="image/*" multiple></div>
        <div class="photo-grid" id="siPhotoPreview"></div>
      </div>
      <div class="form-group"><label>Inspector Signature</label>
        <div class="sig-pad"><canvas id="siSig"></canvas><button class="sig-clear" onclick="siSigPad.clear()">Clear</button></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('modalNew')">Cancel</button>
      <button class="btn btn-primary" onclick="submitInspection()">Submit Inspection →</button>
    </div>
  </div>
</div>

<!-- View/Action Modal -->
<div class="modal-backdrop" id="modalView">
  <div class="modal" style="max-width:700px">
    <div class="modal-head"><h2 id="viewTitle">Inspection Details</h2><button class="modal-close" onclick="closeModal('modalView')">✕</button></div>
    <div class="modal-body" id="viewBody"></div>
    <div class="modal-foot" id="viewFoot"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
if (!initPage('safety')) throw '';
let allData = [], siSigPad, issueCount = 0;
const user = Auth.get();

const demoData = [
  {id:'SI-089',date:'2026-05-01',location:'Block A L5',issues:3,status:'Open',inspector:'Safety Team',severity:'High',contractor:'ABC',items:[{desc:'Missing barricade at opening',severity:'High',status:'Open'},{desc:'No fire extinguisher',severity:'Medium',status:'Open'},{desc:'Debris blocking exit',severity:'High',status:'Open'}]},
  {id:'SI-088',date:'2026-04-30',location:'Block B L8',issues:2,status:'Rectifying',inspector:'Rizal',severity:'Critical',contractor:'XYZ',items:[{desc:'Unsecured scaffolding',severity:'Critical',status:'Rectifying'},{desc:'Worker without harness',severity:'High',status:'Rectified'}]},
  {id:'SI-087',date:'2026-04-29',location:'Block C L3',issues:1,status:'Closed',inspector:'Safety Team',severity:'Medium',contractor:'BuildCo',items:[{desc:'Improper PPE usage',severity:'Medium',status:'Closed'}]},
  {id:'SI-086',date:'2026-04-28',location:'Block D L1',issues:4,status:'Rectifying',inspector:'Ahmad',severity:'High',contractor:'ABC',items:[{desc:'Blocked emergency exit',severity:'Critical',status:'Rectified'},{desc:'Expired fire extinguisher',severity:'Medium',status:'Rectifying'},{desc:'Poor housekeeping',severity:'Low',status:'Rectified'},{desc:'No warning signs',severity:'Medium',status:'Open'}]},
  {id:'SI-085',date:'2026-04-27',location:'Block A L2',issues:1,status:'Closed',inspector:'Raj',severity:'Low',contractor:'PowerTech',items:[{desc:'Minor housekeeping issue',severity:'Low',status:'Closed'}]},
];

function addIssueRow() {
  issueCount++;
  const div = document.createElement('div');
  div.style.cssText = 'background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px';
  div.innerHTML = `<div class="form-row"><div class="form-group"><label>Issue #${issueCount}</label><input class="form-input issue-desc" placeholder="Describe the issue..."></div><div class="form-group"><label>Severity</label><select class="form-input issue-sev"><option>Low</option><option>Medium</option selected>Medium</option><option>High</option><option>Critical</option></select></div></div>`;
  document.getElementById('issuesList').appendChild(div);
}

function openNewInspection() {
  issueCount = 0;
  document.getElementById('issuesList').innerHTML = '';
  addIssueRow();
  openModal('modalNew');
  siSigPad = new SignaturePad('siSig');
  setupPhotoUpload('siPhotos','siPhotoPreview');
}

async function load() {
  showLoad('Loading Safety Inspections...');
  let d = await API.get('getSafetyInspections');
  allData = (d && d.items) ? d.items : demoData;
  renderTable(allData);
  hideLoad();
  updateWorkflowSteps();
}

function renderTable(items) {
  document.getElementById('tbl').innerHTML = items.length ? items.map(r => `<tr>
    <td style="color:var(--yellow);font-weight:600;cursor:pointer" onclick="viewInsp('${r.id}')">${r.id}</td>
    <td>${fmtDate(r.date)}</td><td>${r.location}</td><td>${r.issues}</td><td>${statusBadge(r.status)}</td><td>${r.inspector}</td>
    <td><button class="btn btn-secondary btn-sm" onclick="viewInsp('${r.id}')">View</button></td>
  </tr>`).join('') : '<tr><td colspan="7" class="empty">No records</td></tr>';
}

function filter() {
  const st = document.getElementById('fStatus').value;
  const sev = document.getElementById('fSev').value;
  const q = document.getElementById('fSearch').value.toLowerCase();
  renderTable(allData.filter(r => (!st || r.status === st) && (!sev || r.severity === sev) && (!q || Object.values(r).some(v => String(v).toLowerCase().includes(q)))));
}

function updateWorkflowSteps() {
  const open = allData.filter(r => r.status === 'Open').length;
  const rect = allData.filter(r => r.status === 'Rectifying').length;
  const closed = allData.filter(r => r.status === 'Closed').length;
  document.getElementById('ws1').className = 'workflow-step' + (open > 0 ? ' active' : ' done');
  document.getElementById('ws2').className = 'workflow-step' + (rect > 0 ? ' active' : (open > 0 ? '' : ' done'));
  document.getElementById('ws3').className = 'workflow-step' + (closed > 0 && open === 0 && rect === 0 ? ' done' : '');
  document.getElementById('ws1').innerHTML = `<span class="num">${open}</span>Open`;
  document.getElementById('ws2').innerHTML = `<span class="num">${rect}</span>Rectifying`;
  document.getElementById('ws3').innerHTML = `<span class="num">${closed}</span>Closed`;
}

function viewInsp(id) {
  const insp = allData.find(r => r.id === id);
  if (!insp) return;
  document.getElementById('viewTitle').textContent = insp.id + ' — ' + insp.location;
  document.getElementById('viewBody').innerHTML = `
    <div class="form-row"><div class="form-group"><label>Date</label><p>${fmtDate(insp.date)}</p></div><div class="form-group"><label>Status</label><p>${statusBadge(insp.status)}</p></div></div>
    <div class="form-row"><div class="form-group"><label>Inspector</label><p>${insp.inspector}</p></div><div class="form-group"><label>Contractor</label><p>${insp.contractor || '-'}</p></div></div>
    <h3 style="margin:14px 0 8px;font-size:14px">Issues (${insp.items?.length || 0})</h3>
    <table class="dt"><thead><tr><th>Description</th><th>Severity</th><th>Status</th><th>Action</th></tr></thead><tbody>
    ${(insp.items || []).map((it, i) => `<tr>
      <td style="color:var(--text-primary)">${it.desc}</td>
      <td>${sevBadge(it.severity)}</td>
      <td>${statusBadge(it.status)}</td>
      <td>${it.status === 'Open' ? `<button class="btn btn-success btn-sm" onclick="rectifyIssue('${id}',${i})">Rectify</button>` : it.status === 'Rectified' || it.status === 'Rectifying' ? `<button class="btn btn-primary btn-sm" onclick="closeIssue('${id}',${i})">Close</button>` : '✓'}</td>
    </tr>`).join('')}</tbody></table>`;
  document.getElementById('viewFoot').innerHTML = `<button class="btn btn-secondary" onclick="closeModal('modalView')">Close</button>`;
  openModal('modalView');
}

async function rectifyIssue(inspId, idx) { showLoad('Updating...'); await API.post('rectifyIssue', {inspId, idx, by: user.username}); hideLoad(); toast('Issue marked for rectification','ok'); closeModal('modalView'); load(); }
async function closeIssue(inspId, idx) { showLoad('Closing issue...'); await API.post('closeIssue', {inspId, idx, by: user.username}); hideLoad(); toast('Issue closed','ok'); closeModal('modalView'); load(); }

async function submitInspection() {
  const loc = document.getElementById('siLoc').value;
  if (!loc) { toast('Enter location','err'); return; }
  const issues = Array.from(document.querySelectorAll('#issuesList > div')).map(div => ({
    desc: div.querySelector('.issue-desc').value,
    severity: div.querySelector('.issue-sev').value
  })).filter(i => i.desc);
  if (!issues.length) { toast('Add at least one issue','err'); return; }
  const data = { location: loc, date: document.getElementById('siDate').value, project: document.getElementById('siProject').value, contractor: document.getElementById('siContractor').value, issues: JSON.stringify(issues), inspector: user.username, signature: siSigPad && !siSigPad.isEmpty() ? siSigPad.toDataURL() : '' };
  showLoad('Submitting...');
  const r = await API.post('submitInspection', data);
  hideLoad();
  if (r && r.success) { toast('Inspection submitted!','ok'); closeModal('modalNew'); load(); } else toast(r?.error || 'Failed','err');
}

load();
</script>
</body>
</html>
