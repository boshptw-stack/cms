<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div class="icon">🏗️</div>
          <h1>Construction Management System</h1>
          <p>PTW · TBM · Safety Inspection · QAQC</p>
        </div>

        <div class="login-error" id="loginError">Invalid username or password</div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-primary" id="loginBtn">Sign In →</button>
        </form>

        <div class="login-demo">
          <h4>Demo Accounts</h4>
          <div class="demo-accounts">
            <button class="demo-btn" onclick="quickLogin('supervisor','pass123')">
              supervisor <span>Supervisor</span>
            </button>
            <button class="demo-btn" onclick="quickLogin('pic','pass123')">
              pic <span>PIC</span>
            </button>
            <button class="demo-btn" onclick="quickLogin('safety','pass123')">
              safety <span>Safety Officer</span>
            </button>
            <button class="demo-btn" onclick="quickLogin('pm','pass123')">
              pm <span>Project Manager</span>
            </button>
            <button class="demo-btn" onclick="quickLogin('qaqc','pass123')">
              qaqc <span>QAQC</span>
            </button>
            <button class="demo-btn" onclick="quickLogin('admin','admin123')">
              admin <span>Administrator</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzmpyJyKnLbm481LWEoT_KEhjO42_TksJDdErnNf9VvINrIKW2YOM9CLqP49XOQ53xdWw/exec',
      BASE_PATH: '/cms/'
    };

    // Demo credentials
    const DEMO_USERS = {
      supervisor: { password: 'pass123', role: 'Supervisor' },
      pic:        { password: 'pass123', role: 'PIC' },
      safety:     { password: 'pass123', role: 'Safety Officer' },
      pm:         { password: 'pass123', role: 'Project Manager' },
      qaqc:       { password: 'pass123', role: 'QAQC' },
      admin:      { password: 'admin123', role: 'Administrator' }
    };

    // Check if already logged in
    const existing = sessionStorage.getItem('cms_user');
    if (existing) {
      window.location.href = CONFIG.BASE_PATH + 'dashboard.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.style.display = 'none';

      // Try API login first
      let authenticated = false;
      let role = '';
      try {
        const url = new URL(CONFIG.SCRIPT_URL);
        url.searchParams.set('action', 'login');
        url.searchParams.set('username', username);
        url.searchParams.set('password', password);
        const resp = await fetch(url.toString());
        const data = await resp.json();
        if (data && data.success) {
          authenticated = true;
          role = data.role || 'User';
        }
      } catch(err) {
        console.log('API login unavailable, using demo credentials');
      }

      // Fallback to demo credentials
      if (!authenticated) {
        const demo = DEMO_USERS[username];
        if (demo && demo.password === password) {
          authenticated = true;
          role = demo.role;
        }
      }

      if (authenticated) {
        sessionStorage.setItem('cms_user', JSON.stringify({ username, role }));
        window.location.href = CONFIG.BASE_PATH + 'dashboard.html';
      } else {
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }

    function quickLogin(username, password) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
  </script>
</body>
</html>
