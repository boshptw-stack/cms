<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login — BOSH CMS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo">🏗️</div>
        <h1>BOSH CMS</h1>
        <p>Construction Management System</p>
      </div>
      <div class="login-error" id="err">Invalid username or password</div>
      <form id="loginForm" onsubmit="doLogin(event)">
        <div class="form-group"><label>Username</label><input class="form-input" id="user" placeholder="Enter username" required></div>
        <div class="form-group"><label>Password</label><input class="form-input" id="pass" type="password" placeholder="Enter password" required></div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In →</button>
      </form>
      <div class="demo-grid">
        <div class="label">Quick Demo Access</div>
        <button class="demo-btn" onclick="quick('supervisor','pass123')">supervisor<small>Supervisor</small></button>
        <button class="demo-btn" onclick="quick('pic','pass123')">pic<small>PIC</small></button>
        <button class="demo-btn" onclick="quick('safety','pass123')">safety<small>Safety</small></button>
        <button class="demo-btn" onclick="quick('pm','pass123')">pm<small>PM</small></button>
        <button class="demo-btn" onclick="quick('qaqc','pass123')">qaqc<small>QAQC</small></button>
        <button class="demo-btn" onclick="quick('admin','admin123')">admin<small>Admin</small></button>
      </div>
    </div>
  </div>
</div>
<script>
const DEMO={supervisor:{pw:'pass123',role:'Supervisor'},pic:{pw:'pass123',role:'PIC'},safety:{pw:'pass123',role:'Safety Officer'},pm:{pw:'pass123',role:'Project Manager'},qaqc:{pw:'pass123',role:'QAQC'},admin:{pw:'admin123',role:'Administrator'}};
if(sessionStorage.getItem('cms_user'))location.href=CONFIG.BASE_PATH+'dashboard.html';
async function doLogin(e){
  e.preventDefault();const btn=document.getElementById('loginBtn'),errEl=document.getElementById('err');
  const username=document.getElementById('user').value.trim().toLowerCase(),password=document.getElementById('pass').value;
  btn.disabled=true;btn.textContent='Signing in...';errEl.style.display='none';
  let ok=false,role='';
  try{const url=new URL(CONFIG.GAS_URL);url.searchParams.set('action','login');url.searchParams.set('username',username);url.searchParams.set('password',password);const r=await fetch(url);const d=await r.json();if(d&&d.success){ok=true;role=d.role;}}catch(e){}
  if(!ok){const dm=DEMO[username];if(dm&&dm.pw===password){ok=true;role=dm.role;}}
  if(ok){sessionStorage.setItem('cms_user',JSON.stringify({username,role}));location.href=CONFIG.BASE_PATH+'dashboard.html';}
  else{errEl.style.display='block';btn.disabled=false;btn.textContent='Sign In →';}
}
function quick(u,p){document.getElementById('user').value=u;document.getElementById('pass').value=p;document.getElementById('loginForm').requestSubmit();}
</script>
</body>
</html>
